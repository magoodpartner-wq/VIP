<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第二關：表單製作 | 美安 AI 顧問系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap'); body { font-family: 'Noto Sans TC', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800">
    <nav class="bg-white border-b py-4 px-6 mb-8 text-center"><h1 class="font-bold text-xl text-blue-600">美安 AI 自動化推薦系統實作</h1></nav>
    <main class="max-w-3xl mx-auto px-6 mb-20">
        <div class="flex justify-between text-xs font-bold text-gray-400 mb-8">
            <span class="text-blue-600">✓ 完成</span><span class="text-blue-600">2. 表單</span><span>3. API</span><span>4. 程式碼</span><span>5. 觸發器</span><span>6. 測試</span>
        </div>
        
        <h2 class="text-3xl font-extrabold mb-6"><i class="fas fa-list-check text-blue-500 mr-3"></i>第二關：製作顧客問卷</h2>
        <div class="bg-white p-8 rounded-xl border shadow-sm">
            <ol class="list-decimal list-inside space-y-5 text-gray-700 text-lg">
                <li>建立一個新的 <strong>Google 表單</strong>。
                    <div class="mt-4 mb-2 p-5 bg-blue-50 rounded-lg border border-blue-200 ml-6">
                        <p class="text-base text-blue-800 mb-3"><i class="fas fa-magic mr-2"></i><strong>新手捷徑：</strong>不想自己從頭設計表單嗎？點擊下方按鈕，直接複製我們為你準備好的高轉化率問卷範本！</p>
                        <a href="https://docs.google.com/forms/d/1-ua6rBDW7dA5HxbKebsZKLfCbZ3xa_N2bBGJnJED118/copy" target="_blank" class="inline-block bg-blue-600 text-white text-sm font-bold px-5 py-2.5 rounded shadow hover:bg-blue-700 transition">
                            <i class="fas fa-copy mr-2"></i>一鍵複製表單範本
                        </a>
                    </div>
                </li>
                <li>根據你的需求，稍微微調或新增問題（例如：姓名、肌膚困擾、生活習慣、是否懷孕、Email 信箱）。</li>
                <li class="p-4 bg-yellow-50 rounded-lg border border-yellow-200 mt-4">
                    <strong>關鍵步驟：</strong><br>
                    在表單的「回覆」分頁，點擊 <strong>「連結至試算表」</strong>，並選擇「選取現有試算表」，將它連結到我們在第一關建立的那份試算表中！
                </li>
            </ol>
        </div>

        <div class="mt-8 flex justify-between">
            <a href="index.html" class="text-gray-500 hover:text-blue-600 font-bold py-3"><i class="fas fa-arrow-left mr-2"></i> 上一關</a>
            <a href="part3.html" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700 transition">完成！前往第三關 <i class="fas fa-arrow-right ml-2"></i></a>
        </div>
    </main>
</body>
</html>
